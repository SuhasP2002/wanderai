spring.application.name=wanderai-backend
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/wanderai
spring.datasource.username=postgres
spring.datasource.password=1111

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=wanderai_super_secret_key_minimum_32_characters_long
jwt.expiration=86400000

# Groq AI (OpenAI compatible)
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.7

# Razorpay
razorpay.key.id=rzp_test_SrttUMA4FjpTwk
razorpay.key.secret=lAFQd6ejNSzn0PVg85KsWel7
razorpay.webhook.secret=test_webhook_secret

# Credits config
credits.free.monthly=3

# CORS
cors.allowed-origins=http://localhost:3000,https://wanderai-frontend-50z8.onrender.com,https://wanderai-frontend-50z8.onrender.com